name: Dependabot Auto Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  automerge:
    name: merge-or-close-safe-patch-updates
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Merge passing patch updates, close failing ones
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
          PR_SHA: "${{ github.event.pull_request.head.sha }}"
        shell: bash
        run: |
          set -euo pipefail
          status=""
          conclusion=""
          for i in {1..60}; do
            status="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "Dependency Smoke Check" --commit "$PR_SHA" --event pull_request --json status --jq '.[0].status // ""')"
            conclusion="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "Dependency Smoke Check" --commit "$PR_SHA" --event pull_request --json conclusion --jq '.[0].conclusion // ""')"
            if [ "$status" = "completed" ]; then
              break
            fi
            sleep 30
          done

          if [ "$status" != "completed" ]; then
            gh pr close "$PR_URL" --delete-branch --comment "Closing automatically because the dependency smoke check did not complete in time."
            exit 0
          fi

          if [ "$conclusion" != "success" ]; then
            gh pr close "$PR_URL" --delete-branch --comment "Closing automatically because the dependency smoke check failed. No dependency change was merged."
            exit 0
          fi

          gh pr merge "$PR_URL" --squash --delete-branch
